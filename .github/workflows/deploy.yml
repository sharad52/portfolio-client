name: Deploy Vite React App to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      # Pin npm to the exact version that generated package-lock.json.
      # Node bundles a different npm per release, and npm resolves optional/
      # native deps differently across versions — the cause of past `npm ci`
      # lockfile-sync failures. Keep this in step with "packageManager" in package.json.
      - name: Pin npm
        run: npm i -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # Contact-form delivery (set these as repo secrets; both optional).
          # Without them the form falls back to WhatsApp automatically.
          VITE_GOOGLE_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_SCRIPT_URL }}
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
          else
            echo "CLOUDFRONT_DISTRIBUTION_ID secret not set — skipping invalidation."
          fi
